---
- name: Check if Vagrant is installed
  ansible.builtin.command: which vagrant
  register: vagrant_check
  failed_when: false
  changed_when: false

- name: Install prerequisites (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - ansible_os_family == 'Debian'
    - vagrant_check.rc != 0

- name: Configure HashiCorp repository
  ansible.builtin.include_role:
    name: hashicorp_repo
  when: vagrant_check.rc != 0

- name: Install Vagrant (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ 'vagrant=' + vagrant_version if vagrant_version | length > 0 else 'vagrant' }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - ansible_os_family == 'Debian'
    - vagrant_check.rc != 0

- name: Warn that Vagrant on RHEL aarch64 is unsupported by HashiCorp
  ansible.builtin.debug:
    msg: >-
      HashiCorp does not publish Vagrant for {{ ansible_architecture }} on
      the RHEL family; skipping install. To enable, run this role on an
      x86_64 host or install Vagrant from source.
  when:
    - ansible_os_family == 'RedHat'
    - ansible_architecture in ['aarch64', 'arm64']
    - vagrant_check.rc != 0

- name: Install Vagrant (RHEL/CentOS)
  ansible.builtin.dnf:
    name: "{{ 'vagrant-' + vagrant_version if vagrant_version | length > 0 else 'vagrant' }}"
    state: present
    update_cache: true
  become: true
  when:
    - ansible_os_family == 'RedHat'
    - ansible_architecture not in ['aarch64', 'arm64']
    - vagrant_check.rc != 0
