---
- name: Check if Packer is installed
  ansible.builtin.command: which packer
  register: packer_check
  failed_when: false
  changed_when: false

- name: Configure HashiCorp repository
  ansible.builtin.include_role:
    name: hashicorp_repo
  when: packer_check.rc != 0

- name: Install Packer (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ 'packer=' + packer_version if packer_version | length > 0 else 'packer' }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - ansible_os_family == 'Debian'
    - packer_check.rc != 0

- name: Install Packer (RHEL/CentOS)
  ansible.builtin.dnf:
    name: "{{ 'packer-' + packer_version if packer_version | length > 0 else 'packer' }}"
    state: present
  become: true
  when:
    - ansible_os_family == 'RedHat'
    - packer_check.rc != 0

- name: Ensure /sbin/packer is a symlink (RHEL/CentOS)
  when: ansible_os_family == 'RedHat'
  block:
    - name: Stat /usr/bin/packer
      ansible.builtin.stat:
        path: /usr/bin/packer
      register: usr_bin_packer

    - name: Stat /sbin/packer
      ansible.builtin.stat:
        path: /sbin/packer
      register: sbin_packer
      when: usr_bin_packer.stat.exists

    - name: Remove non-symlink /sbin/packer
      ansible.builtin.file:
        path: /sbin/packer
        state: absent
      become: true
      when:
        - usr_bin_packer.stat.exists
        - sbin_packer.stat is defined
        - sbin_packer.stat.exists
        - not sbin_packer.stat.islnk

    - name: Symlink /sbin/packer to /usr/bin/packer
      ansible.builtin.file:
        src: /usr/bin/packer
        dest: /sbin/packer
        state: link
      become: true
      when: usr_bin_packer.stat.exists
