---
- name: Check if Kustomize is installed
  ansible.builtin.stat:
    path: /usr/local/bin/kustomize
  register: kustomize_stat

- name: Install Kustomize
  block:
    - name: Download Kustomize install script
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"
        dest: "/tmp/install_kustomize.sh"
        mode: '0755'

    - name: Run Kustomize install script
      ansible.builtin.shell: "bash /tmp/install_kustomize.sh"
      args:
        executable: /bin/bash
        chdir: /tmp

    - name: Move kustomize to /usr/local/bin
      ansible.builtin.command: mv /tmp/kustomize /usr/local/bin/
      become: true

    - name: Clean up install script
      ansible.builtin.file:
        path: "/tmp/install_kustomize.sh"
        state: absent
  when: not kustomize_stat.stat.exists
