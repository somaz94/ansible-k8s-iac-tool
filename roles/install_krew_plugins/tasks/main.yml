---
- name: Validate required role variables
  ansible.builtin.assert:
    that:
      - home_user is defined
      - home_user is string
      - home_user | length > 0
    fail_msg: "install_krew_plugins requires `home_user` to be set (non-empty string)."
    quiet: true

- name: Get home directory of specific user
  ansible.builtin.getent:
    database: passwd
    key: "{{ home_user }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home_dir: "{{ ansible_facts.getent_passwd[home_user][4] }}"

- name: List currently installed krew plugins
  ansible.builtin.command: kubectl krew list
  register: krew_list
  changed_when: false
  failed_when: krew_list.rc > 1
  environment:
    KREW_ROOT: "{{ user_home_dir }}/.krew"
    PATH: "/usr/local/bin:{{ user_home_dir }}/.krew/bin:{{ ansible_env.PATH }}"
  when: krew_plugins is defined

- name: Install krew plugins
  ansible.builtin.command: "kubectl krew install {{ item }}"
  loop: "{{ krew_plugins }}"
  when:
    - krew_plugins is defined
    - item not in krew_list.stdout_lines
  environment:
    KREW_ROOT: "{{ user_home_dir }}/.krew"
    PATH: "/usr/local/bin:{{ user_home_dir }}/.krew/bin:{{ ansible_env.PATH }}"
  become: false
  register: plugin_install_result
  changed_when: "'Added plugin' in plugin_install_result.stdout"
