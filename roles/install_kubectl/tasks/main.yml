---
- name: Check if kubectl is installed
  ansible.builtin.stat:
    path: "{{ kubectl_install_path }}"
  register: kubectl_stat

- name: Set kubectl_installed fact
  ansible.builtin.set_fact:
    kubectl_installed: "{{ kubectl_stat.stat.exists }}"

- name: Add required tools (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - gnupg
      - software-properties-common
      - wget
      - curl
      - git
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'
  become: true

- name: Add required tools (RedHat)
  # Note: `curl` is omitted because EL9 ships `curl-minimal` which already
  # provides the curl binary; installing `curl` conflicts with curl-minimal.
  ansible.builtin.dnf:
    name:
      - gnupg2
      - wget
      - git
    state: present
  when: ansible_os_family == 'RedHat'
  become: true

- name: Resolve kubectl version (latest stable when unset)
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: kubectl_latest_query
  when:
    - not kubectl_installed
    - kubectl_version | length == 0

- name: Set effective kubectl version
  ansible.builtin.set_fact:
    kubectl_effective_version: "{{ kubectl_version if kubectl_version | length > 0 else kubectl_latest_query.content | trim }}"
  when: not kubectl_installed

- name: Install kubectl using binary
  when: not kubectl_installed
  block:
    - name: Fetch kubectl checksum
      ansible.builtin.uri:
        url: "https://dl.k8s.io/release/{{ kubectl_effective_version }}/bin/linux/{{ kubectl_arch }}/kubectl.sha256"
        return_content: true
      register: kubectl_checksum_query

    - name: Download kubectl binary
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_effective_version }}/bin/linux/{{ kubectl_arch }}/kubectl"
        dest: "{{ kubectl_install_path }}"
        owner: root
        group: root
        mode: '0755'
        checksum: "sha256:{{ kubectl_checksum_query.content | trim }}"
        force: false
      become: true
