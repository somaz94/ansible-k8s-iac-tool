---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2204}-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ../../roles
    # Required because molecule-plugins/docker destroy.yml uses
    # `when: (lookup('env', 'HOME'))` which ansible-core >= 2.18 rejects
    # as a broken (non-boolean) conditional. Until the plugin is patched,
    # accept the string-truthy conditional.
    ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "True"
verifier:
  name: ansible
