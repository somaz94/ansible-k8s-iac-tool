---
- name: Converge
  hosts: all
  become: true

  pre_tasks:
    - name: Include group_vars
      ansible.builtin.include_vars: ../../group_vars/all/vars.yml

    - name: Add target user
      ansible.builtin.user:
        name: "{{ home_user }}"
        shell: /bin/bash
        create_home: true

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Update dnf cache
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_os_family == 'RedHat'

  roles:
    - role: setup_shell
    - role: install_kubectl
    - role: install_krew
    - role: install_krew_plugins
    - role: install_terraform
    - role: install_packer
    - role: install_vagrant
    - role: install_helm
    - role: install_pulumi
    - role: install_kustomize

  post_tasks:
    - name: Notify about shell config reload
      ansible.builtin.debug:
        msg: "Shell configuration will be applied on the next session."
      changed_when: false

    - name: Set ownership for .krew directory
      ansible.builtin.file:
        path: "~{{ home_user }}/.krew"
        owner: "{{ home_user }}"
        group: "{{ home_user }}"
        recurse: true
        state: directory
