name: Molecule Test

on:
  push:
    branches:
      - main
    paths:
      - "roles/**"
      - "molecule/**"
      - "group_vars/**"
      - "templates/**"
      - "meta/**"
      - "galaxy.yml"
      - "requirements.txt"
      - ".github/workflows/molecule-test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "roles/**"
      - "molecule/**"
      - "group_vars/**"
      - "templates/**"
      - "meta/**"
      - "galaxy.yml"
      - "requirements.txt"
      - ".github/workflows/molecule-test.yml"
  workflow_dispatch:

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2204
          - ubuntu2404
          - debian11
          - debian12
          - rockylinux9

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible molecule molecule-plugins[docker] docker

      - name: Run Molecule test
        run: molecule test
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
